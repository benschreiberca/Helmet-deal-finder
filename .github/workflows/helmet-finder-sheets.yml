name: Daily Helmet Deal Finder

on:
  schedule:
    # Run daily at 9 AM UTC (adjust to your timezone below)
    - cron: '0 9 * * *'
  
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  find-deals:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install googleapis
      
      - name: Run helmet deal finder
  env:
    SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
    GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
  run: node helmet-finder-sheets.js
      
      - name: Log results
        if: always()
        run: echo "Deal finder execution completed"
