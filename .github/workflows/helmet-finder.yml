name: Daily Helmet Deal Finder

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:
  push:
    branches:
      - claude/fix-helmet-scraping-CgOrb
    paths:
      - 'helmet-finder.js'
      - 'package.json'
      - '.github/workflows/helmet-finder.yml'

permissions:
  contents: write

jobs:
  find-deals:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run helmet deal finder
        env:
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: node helmet-finder.js

      - name: Commit price results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PRICES.md
          git diff --staged --quiet || git commit -m "chore: update helmet prices $(date -u '+%Y-%m-%d %H:%M UTC') [skip ci]"
          git push
